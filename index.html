  // Track whether import is running (set by modal via t.set)
  var MODAL_URL = 'https://dtluc2000.github.io/metaprints-trello-csv-master/modal.html';

  function openModal(t) {
    return t.modal({
      url: MODAL_URL + '?v=18',
      title: 'Metaprints CSV Master',
      fullscreen: false,
      height: 700,
      callback: function(t) {
        // Called when user tries to close modal via X or Escape or clicking outside
        // Check if import is running
        return t.get('board', 'private', 'importRunning').then(function(val) {
          if (val === true) {
            // Show confirmation popup
            return t.popup({
              type: 'confirm',
              title: '⚠️ Import in progress',
              message: 'Import is still running! If you close now, some cards may not be created. Are you sure you want to exit?',
              confirmText: 'Yes, close anyway',
              onConfirm: function(t) {
                return t.set('board', 'private', 'importRunning', false).then(function() {
                  return t.closeModal();
                });
              },
              onCancel: function(t) {
                return t.closePopup();
              },
              confirmStyle: 'danger'
            });
          }
          // Not importing — close normally
          return t.closeModal();
        });
      }
    });
  }

  TrelloPowerUp.initialize({
    'board-buttons': function(t, options) {
      return [{
        icon: { dark: WHITE_ICON, light: DARK_ICON },
        text: 'CSV Master',
        callback: function(t) {
          return openModal(t);
        }
      }];
    }
